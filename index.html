<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleek Creator Pro</title>
    <style>
        :root {
            --bg-main: #0b0f17;
            --card-bg: #131924;
            --card-inner: #1b2333;
            --text-main: #ffffff;
            --text-muted: #64748b;
            --accent: #3b82f6;
            --accent-gradient: linear-gradient(135deg, #475569, #334155);
            --btn-gradient: linear-gradient(135deg, #64748b, #475569);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            background-image: radial-gradient(#1e293b 1px, transparent 1px);
            background-size: 24px 24px;
        }

        .phone-wrapper {
            width: 100%;
            max-width: 420px;
            min-height: 100vh;
            background-color: #0f141f;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            position: relative;
        }

        /* --- App Top Bar --- */
        .app-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid #1e293b;
        }

        .menu-btn, .share-btn {
            background: none;
            border: none;
            color: var(--text-main);
            cursor: pointer;
            padding: 5px;
        }

        .app-title {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        /* --- Main Scrollable Content --- */
        .main-content {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-y: auto;
            padding-bottom: 100px; /* Space for the floating bottom button */
        }

        .section-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid #1e293b;
        }

        .section-title {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            font-weight: 700;
        }

        /* --- Grid Configurations --- */
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .grid-item {
            background: var(--card-inner);
            border-radius: 12px;
            padding: 14px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            text-align: center;
            border: 1px solid #243147;
        }

        .grid-item span {
            font-size: 0.8rem;
            color: #94a3b8;
            font-weight: 500;
        }

        .grid-icon {
            width: 22px;
            height: 22px;
            color: #94a3b8;
        }

        /* Active highlight for Workspace first item */
        .grid-item.active {
            background: #243147;
            border-color: #3b82f6;
        }
        .grid-item.active .grid-icon, .grid-item.active span {
            color: var(--text-main);
        }

        /* --- Settings Input UI (Hidden inside Workspace Card) --- */
        .input-group {
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .input-group label {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 600;
        }
        input {
            width: 100%;
            padding: 12px;
            background: #090d14;
            border: 1px solid #243147;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
            font-size: 0.9rem;
        }
        input:focus {
            outline: none;
            border-color: var(--accent);
        }

        /* --- Clip Feed Preview Deck --- */
        .feed-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .video-card {
            background: var(--card-inner);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #243147;
        }

        .thumbnail-area {
            width: 100%;
            height: 160px;
            background: linear-gradient(45deg, #1e293b, #0f172a);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .play-button {
            width: 46px;
            height: 46px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .meta-area {
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .meta-title {
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 2px;
        }

        .meta-sub {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .dots-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.2rem;
            cursor: pointer;
        }

        /* --- Main Action Sticky Footer --- */
        .footer-action {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            background: linear-gradient(transparent, #0f141f 40%);
        }

        .action-btn {
            width: 100%;
            padding: 16px;
            background: var(--btn-gradient);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.3);
            transition: opacity 0.2s;
        }

        .action-btn:active {
            opacity: 0.8;
        }

        /* --- Dynamic Results Display --- */
        .output-box {
            background: #090d14;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid #243147;
            white-space: pre-wrap;
            font-size: 0.9rem;
            line-height: 1.5;
            display: none;
        }

        .loading-status {
            text-align: center;
            color: var(--accent);
            font-weight: 600;
            font-size: 0.9rem;
            display: none;
            padding: 10px;
        }
    </style>
</head>
<body>

<div class="phone-wrapper">
    <header class="app-bar">
        <button class="menu-btn">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
        <div class="app-title">Sleek Creator Pro</div>
        <button class="share-btn">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
        </button>
    </header>

    <main class="main-content">
        
        <div class="section-card">
            <div class="section-title">Workspace</div>
            <div class="grid-3">
                <div class="grid-item active">
                    <svg class="grid-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                    <span>Img</span>
                </div>
                <div class="grid-item">
                    <svg class="grid-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
                    <span>Vid</span>
                </div>
                <div class="grid-item">
                    <svg class="grid-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="4" y1="9" x2="20" y2="9"></line><line x1="4" y1="15" x2="20" y2="15"></line><line x1="10" y1="3" x2="10" y2="21"></line><line x1="16" y1="3" x2="16" y2="21"></line></svg>
                    <span>Txt</span>
                </div>
            </div>

            <div class="input-group" style="margin-top: 16px;">
                <label for="apiKey">Gemini API Key</label>
                <input type="password" id="apiKey" placeholder="Enter secure Gemini Key...">
            </div>
            <div class="input-group">
                <label for="videoUrl">YouTube URL / Video ID</label>
                <input type="text" id="videoUrl" placeholder="https://www.youtube.com/watch?v=...">
            </div>
        </div>

        <div class="section-card">
            <div class="section-title">Tools</div>
            <div class="grid-3">
                <div class="grid-item">
                    <svg class="grid-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="6" cy="6" r="3"></circle><circle cx="6" cy="18" r="3"></circle><line x1="20" y1="4" x2="8.12" y2="15.88"></line><line x1="14.47" y1="14.48" x2="20" y2="20"></line><line x1="8.12" y1="8.12" x2="12" y2="12"></line></svg>
                    <span>Trim</span>
                </div>
                <div class="grid-item active">
                    <svg class="grid-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 1l4 4-4 4"></path><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><path d="M7 23l-4-4 4-4"></path><path d="M21 13v2a4 4 0 0 1-4 4H3"></path></svg>
                    <span>Repurpose</span>
                </div>
                <div class="grid-item">
                    <svg class="grid-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <span>Analyze</span>
                </div>
            </div>
        </div>

        <div id="loadingStatus" class="loading-status">Extracting transcript & mapping hook windows...</div>
        <div id="output" class="output-box"></div>

        <div class="section-card" id="previewDeck">
            <div class="section-title">Clip Feed</div>
            <div class="feed-container">
                <div class="video-card">
                    <div class="thumbnail-area">
                        <div class="play-button">
                            <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                        </div>
                    </div>
                    <div class="meta-area">
                        <div>
                            <div class="meta-title">Prepared Content Asset</div>
                            <div class="meta-sub">Ready to process sequence</div>
                        </div>
                        <button class="dots-btn">&#8942;</button>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <div class="footer-action">
        <button class="action-btn" onclick="processVideo()">Process & Upload</button>
    </div>
</div>

<script>
    function extractVideoId(url) {
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(regExp);
        return (match && match[2].length === 11) ? match[2] : null;
    }

    async function processVideo() {
        const apiKey = document.getElementById('apiKey').value;
        const videoUrl = document.getElementById('videoUrl').value;
        const outputBox = document.getElementById('output');
        const loadingStatus = document.getElementById('loadingStatus');
        const previewDeck = document.getElementById('previewDeck');

        if (!apiKey || !videoUrl) {
            alert('Please configure both your API Key and a Video Link inside your Workspace.');
            return;
        }

        const videoId = extractVideoId(videoUrl);
        if (!videoId) {
            alert('Invalid YouTube URL config profile');
            return;
        }

        outputBox.style.display = 'none';
        loadingStatus.style.display = 'block';

        try {
            // 1. Fetch transcript chunks cleanly inside the browser pipeline
            const response = await fetch(`https://subtitles-scraper.vercel.app/api/transcript?v=${videoId}`);
            const data = await response.json();
            
            if (!data.transcript) {
                throw new Error("Target clip text structure unmappable. Confirm standard caption flags are set.");
            }

            // 2. Structuring prompt arrays optimized for Gemini 2.5 Flash execution
            const promptText = `Analyze this video transcript and identify the single most engaging 30-to-60-second segment that would make a viral TikTok or Reel. Format the output with clear bold headers for 3 Viral Title Options, the Estimated Timestamp, and a ready-to-use Caption with Hashtags. Transcript text: ${data.transcript}`;

            // 3. Native REST connection straight to the Google GenAI Engine
            const geminiResponse = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: promptText }] }]
                })
            });

            const geminiData = await geminiResponse.json();
            const aiText = geminiData.candidates[0].content.parts[0].text;

            // Update app frame rendering profiles
            loadingStatus.style.display = 'none';
            outputBox.innerText = aiText;
            outputBox.style.display = 'block';
            previewDeck.scrollIntoView({ behavior: 'smooth' });

        } catch (error) {
            loadingStatus.style.display = 'none';
            alert("Pipeline Interrupted: " + error.message);
        }
    }
</script>

</body>
</html>
