<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Content Repurposer</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            box-sizing: border-box;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
            text-align: center;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
            margin-bottom: 15px;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:active {
            background: #1d4ed8;
        }

        .output-box {
            margin-top: 25px;
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #334155;
            white-space: pre-wrap;
            font-size: 0.95rem;
            line-height: 1.5;
            display: none;
        }

        .loading {
            text-align: center;
            color: #38bdf8;
            font-weight: bold;
            display: none;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>AI Repurposer ⚡</h1>
    <p class="subtitle">Turn YouTube links into viral short-form hooks</p>

    <label for="apiKey">Gemini API Key</label>
    <input type="password" id="apiKey" placeholder="Paste your AI key here...">

    <label for="videoUrl">YouTube Video Link</label>
    <input type="text" id="videoUrl" placeholder="https://www.youtube.com/watch?v=...">

    <button onclick="processVideo()">Generate Viral Clips</button>

    <div id="loadingStatus" class="loading">Analyzing video context...</div>
    <div id="output" class="output-box"></div>
</div>

<script>
    function extractVideoId(url) {
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(regExp);
        return (match && match[2].length === 11) ? match[2] : null;
    }

    async function processVideo() {
        const apiKey = document.getElementById('apiKey').value;
        const videoUrl = document.getElementById('videoUrl').value;
        const outputBox = document.getElementById('output');
        const loadingStatus = document.getElementById('loadingStatus');

        if (!apiKey || !videoUrl) {
            alert('Please fill in both fields!');
            return;
        }

        const videoId = extractVideoId(videoUrl);
        if (!videoId) {
            alert('Invalid YouTube URL');
            return;
        }

        // Reset UI
        outputBox.style.display = 'none';
        loadingStatus.style.display = 'block';

        try {
            // 1. Fetching YouTube transcript using a free, browser-friendly subtitle scraper API
            const response = await fetch(`https://subtitles-scraper.vercel.app/api/transcript?v=${videoId}`);
            const data = await response.json();
            
            if (!data.transcript) {
                throw new Error("Could not extract text from this video. Ensure it has captions enabled.");
            }

            // 2. Prepare the prompt for Gemini
            const promptText = `Analyze this video transcript and identify the single most engaging 30-to-60-second segment that would make a viral TikTok or Reel. Format the output with clear bold headers for 3 Viral Title Options, the Estimated Timestamp, and a ready-to-use Caption with Hashtags. Transcript text: ${data.transcript}`;

            // 3. Requesting Gemini API directly from the browser
            const geminiResponse = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: promptText }] }]
                })
            });

            const geminiData = await geminiResponse.json();
            const aiText = geminiData.candidates[0].content.parts[0].text;

            // 4. Show the result
            loadingStatus.style.display = 'none';
            outputBox.innerText = aiText;
            outputBox.style.display = 'block';

        } catch (error) {
            loadingStatus.style.display = 'none';
            alert("Error: " + error.message);
        }
    }
</script>

</body>
</html>
